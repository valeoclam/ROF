<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 震动极限测试</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system; text-align: center; padding: 20px; }
        .card { background: #1c1c1e; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        button { 
            width: 100%; padding: 20px; margin: 10px 0; border-radius: 12px; border: none; 
            font-size: 1.1rem; font-weight: bold; color: #fff; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-blue { background: #007aff; }
        .btn-green { background: #34c759; }
        .btn-orange { background: #ff9500; }
        .status { font-size: 0.9rem; color: #888; margin-top: 10px; line-height: 1.6; text-align: left; }
        .highlight { color: #ff4757; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="margin-top: 30px;">震动功能测试</h2>

    <div class="card">
        <p>模式 1：标准触发 (Click)</p>
        <button class="btn-blue" onclick="runVibrate(200)">单次短震 (200ms)</button>
    </div>

    <div class="card">
        <p>模式 2：最强触发 (TouchStart)</p>
        <button id="touch-btn" class="btn-green">瞬间触碰震动</button>
        <p style="font-size: 0.8rem; color: #666;">(iOS 成功的概率最高)</p>
    </div>

    <div class="card">
        <p>模式 3：双连震 (间隔触发)</p>
        <button class="btn-orange" onclick="runDoubleVibrate()">连续两次震动</button>
    </div>

    <div class="status">
        <b>检查清单：</b><br>
        1. <span class="highlight">必须关闭</span> 手机左侧物理静音开关（不可见橙色）。<br>
        2. 确认 <b>设置 -> 声音与触感 -> 系统触感反馈</b> 已开启。<br>
        3. 确认没有开启 <b>低电量模式</b>（电池图标不是黄色）。<br>
        4. 如果在 Safari 网页中无效，请尝试“添加到主屏幕”后在 App 模式下测试。
    </div>

    <script>
        // 模式 1 & 3 的普通触发
        function runVibrate(ms) {
    // 检查 navigator 对象是否存在震动函数
    if (typeof navigator.vibrate === "function") {
        try {
            const success = navigator.vibrate(ms);
            if (success) {
                console.log("震动指令已发出");
            } else {
                alert("震动指令被系统拒绝（请检查是否静音或低电量）");
            }
        } catch (e) {
            alert("触发震动时发生错误: " + e.message);
        }
    } else {
        // 如果这里报错，说明环境确实不支持
        alert("错误：当前浏览器环境完全不支持 navigator.vibrate 接口。请确认是否使用了 Safari 并通过 HTTPS 访问。");
    }
}

        function runDoubleVibrate() {
            if (navigator.vibrate) {
                navigator.vibrate(200);
                setTimeout(() => {
                    navigator.vibrate(200);
                }, 300);
            }
        }

        // 模式 2：针对 iOS 优化的 TouchStart 触发
        const touchBtn = document.getElementById('touch-btn');
        touchBtn.addEventListener('touchstart', function(e) {
            // e.preventDefault(); // 阻止默认行为
            if (navigator.vibrate) {
                navigator.vibrate(200);
                console.log("TouchStart 震动触发");
            }
        }, false);
    </script>
</body>
</html>
