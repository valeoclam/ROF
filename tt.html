<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 震动测试</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        button { width: 80%; padding: 20px; margin: 10px; border-radius: 10px; border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .btn-1 { background: #3498db; }
        .btn-2 { background: #2ed573; }
        .info { color: #888; font-size: 0.9rem; margin-top: 20px; padding: 0 20px; }
    </style>
</head>
<body>
    <h2>震动功能测试</h2>
    
    <button class="btn-1" onclick="vibrateSingle()">模式 A: 单次短震</button>
    <button class="btn-2" onclick="vibrateDouble()">模式 B: 连续双震</button>

    <div class="info">
        <p>⚠️ 注意事项：</p>
        1. 必须<b>关闭</b>手机侧面的【静音开关】。<br>
        2. 确保在【设置】->【声音与触感】中开启了【系统触感反馈】。<br>
        3. iOS 某些版本仅在用户“点按”瞬间触发。
    </div>

    <script>
        function vibrateSingle() {
            if (navigator.vibrate) {
                navigator.vibrate(200);
                console.log("触发单次震动");
            } else {
                alert("你的浏览器不支持震动 API");
            }
        }

        function vibrateDouble() {
            if (navigator.vibrate) {
                // iOS 兼容性最好的写法：手动延时触发两次
                navigator.vibrate(200);
                setTimeout(() => {
                    navigator.vibrate(200);
                }, 300);
                console.log("触发双次震动");
            }
        }
    </script>
</body>
</html>
