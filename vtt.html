<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>iPhone 震动测试</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont;
            text-align: center;
            padding: 50px;
            background: #f5f5f7;
        }
        button {
            font-size: 20px;
            padding: 15px 30px;
            border-radius: 12px;
            border: none;
            background: #007aff;
            color: white;
        }
    </style>
</head>
<body>

<h1>📳 iPhone 震动测试</h1>
<p>点击按钮尝试触发震动</p>

<button onclick="triggerVibration()">点击震动</button>

<script>
function triggerVibration() {
    // 尝试标准振动API
    if (navigator.vibrate) {
        navigator.vibrate(200);
        alert("尝试使用 Vibration API");
    } else {
        alert("浏览器不支持 vibration API");
    }

    // 备用方案：播放短音频（有时会触发轻微触感反馈）
    const audio = new AudioContext();
    const oscillator = audio.createOscillator();
    oscillator.type = 'square';
    oscillator.frequency.setValueAtTime(200, audio.currentTime);
    oscillator.connect(audio.destination);
    oscillator.start();
    oscillator.stop(audio.currentTime + 0.05);
}
</script>

</body>
</html>
