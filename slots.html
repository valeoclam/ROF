<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Slot Hunter V23</title>
    
    <style>
        :root { --bg: #000; --card: #161616; --text: #fff; --accent: #f1c40f; --danger: #ff4757; --success: #2ed573; --info: #3498db; --backup: #9b59b6; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: env(safe-area-inset-top) 5px env(safe-area-inset-bottom) 5px; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 顶部导航 */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px; flex-shrink: 0; }
        .denom-group { display: flex; background: #222; border-radius: 12px; padding: 2px; overflow-x: auto; }
        .denom-btn { border: none; background: none; color: #666; padding: 8px 15px; font-size: 0.8rem; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .denom-btn.active { background: var(--info); color: #fff; }
        .settings-icon { font-size: 1.5rem; cursor: pointer; padding: 5px; }

        /* 面板区域 */
        .dashboard { background: var(--card); padding: 15px; border-radius: 16px; border: 2px solid #333; margin: 5px 0; flex-shrink: 0; transition: border-color 0.3s; }
        .val-total { font-size: 2.5rem; color: var(--info); font-weight: 900; text-align: center; cursor: pointer; }
        .sub-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-card { background: #222; padding: 10px; border-radius: 12px; text-align: center; }
        .val-sub { font-size: 1.5rem; color: var(--accent); font-weight: bold; cursor: pointer; }
        .label { font-size: 0.7rem; color: #777; display: block; margin-top: 4px; text-transform: uppercase; }
        .alert-msg { height: 30px; line-height: 30px; text-align: center; font-weight: bold; margin-top: 8px; font-size: 0.9rem; }

        /* 按键区域 */
        .action-area { flex-grow: 1; display: flex; flex-direction: column; gap: 12px; padding: 10px 0; }
        .btn-row { display: flex; gap: 12px; flex: 1; min-height: 80px; }
        button { border: none; color: #fff; font-weight: bold; cursor: pointer; transition: opacity 0.1s, transform 0.1s; -webkit-user-select: none; }
        button:active { opacity: 0.7; transform: scale(0.96); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 新增：单/双击大按钮样式 */
        #main-action-btn { 
            flex: 1; background: #333; border: 2px solid #444; border-radius: 25px; 
            font-size: 2rem; line-height: 1.2; transition: background 0.15s;
        }

        .btn-big { flex: 1; background: var(--backup); border-radius: 15px; font-size: 1rem; }
        .btn-next { flex: 1; background: var(--info); border-radius: 15px; font-size: 1rem; }

        /* 设置抽屉 */
        .drawer { 
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 20px; display: flex; flex-direction: column; 
        }
        .drawer.open { right: 0; }
        .config-list { background: #111; border-radius: 15px; padding: 15px; overflow-y: auto; flex-grow: 1; border: 1px solid #222; }
        .config-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; }
        input[type="number"], select { background: #333; border: none; color: #fff; padding: 8px; border-radius: 6px; text-align: center; width: 80px; font-size: 1rem; }
        
        .history-pane { background: #000; border-radius: 10px; padding: 10px; margin-top: 15px; height: 180px; overflow-y: auto; border: 1px solid #333; font-size: 0.85rem; font-family: monospace; }
        .hist-line { padding: 5px 0; border-bottom: 1px solid #111; color: #999; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="denom-group" id="main-denom-bar"></div>
    <div class="settings-icon" onclick="toggleDrawer(true)">⚙️</div>
</div>

<div class="dashboard" id="db-panel">
    <div class="val-total" id="disp-total" onclick="manualEdit('total')">0</div>
    <div style="text-align:center; font-size:0.7rem; color:#555; letter-spacing: 2px;">TOTAL SPINS</div>
    <div class="sub-stats">
        <div class="stat-card">
            <div id="disp-current" class="val-sub" onclick="manualEdit('current')">0</div>
            <span class="label">本台转数</span>
        </div>
        <div class="stat-card">
            <div id="disp-zero" class="val-sub" onclick="manualEdit('zero')">0</div>
            <span class="label">连续零奖</span>
        </div>
    </div>
    <div id="alert-msg" class="alert-msg"></div>
</div>

<div class="action-area">
    <div class="btn-row" style="flex: 2.5;">
        <button id="main-action-btn">
            单击: 没中<br>
            <span style="font-size: 1.1rem; opacity: 0.6; font-weight: normal;">双击: 中奖</span>
        </button>
    </div>
    <div class="btn-row">
        <button class="btn-big" id="btn-backup" onclick="startBackup()">⭐ 10倍大奖</button>
        <button class="btn-next" onclick="nextMachine()">结算换机</button>
    </div>
</div>

<div id="drawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0; color:var(--info);">策略配置</h2>
        <button onclick="toggleDrawer(false)" style="background:#333; padding:8px 15px; border-radius:8px;">关闭</button>
    </div>
    <div class="config-list">
        <div class="config-item"><span>总目标 Spin</span><input type="number" id="cfg-total" onchange="saveCfg()"></div>
        <div class="config-item"><span>连黑止损线</span><input type="number" id="cfg-zero" onchange="saveCfg()"></div>
        <div class="config-item"><span>单机转数上限</span><input type="number" id="cfg-machine" onchange="saveCfg()"></div>
        <div class="config-item"><span>到达上限震动</span><input type="checkbox" id="cfg-vibrate" onchange="saveCfg()" style="transform:scale(1.5);"></div>
        <div class="config-item"><span>默认面值</span><select id="cfg-def-denom" onchange="saveCfg()"></select></div>
        
        <div class="history-pane" id="log-area"></div>
        <button onclick="exportCSV()" style="width:100%; padding:15px; margin-top:15px; background:var(--info); border-radius:12px;">导出 CSV 记录</button>
        <button onclick="resetSystem()" style="width:100%; padding:10px; margin-top:20px; background:none; border:1px solid #444; color:#666; font-size:0.7rem;">清空所有缓存</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'SLOT_HUNTER_V23_CORE';
    let state = {
        total: 0, current: 0, zero: 0, wins: 0, loses: 0, mCount: 1,
        backupLeft: -1, log: [], 
        denomList: ['1¢', '2¢', '5¢'], currentDenom: '1¢', defaultDenom: '1¢',
        limitTotal: 3000, limitZero: 3, limitMachine: 20, useVibrate: true
    };

    let clickTimer = null; // 区分单双击计时器

    function toggleDrawer(open) { document.getElementById('drawer').classList.toggle('open', open); }

    // 核心逻辑：记录 Spin
    function handleSpin(isWin) {
        state.total++; 
        state.current++;
        
        if(isWin) { 
            state.wins++; 
            state.zero = 0; 
            flashFeedback('var(--success)');
        } else { 
            state.loses++; 
            state.zero++; 
            flashFeedback('#555');
        }

        // 备份逻辑：无论胜负，备份次数都扣减
        if(state.backupLeft > 0) state.backupLeft--;
        
        checkVibrate();
        sync();
    }

    // 按钮视觉反馈
    function flashFeedback(color) {
        const btn = document.getElementById('main-action-btn');
        const original = btn.style.background;
        btn.style.background = color;
        setTimeout(() => { btn.style.background = original; }, 150);
    }

    // 10倍大奖备份逻辑
    function startBackup() {
        if(state.current === 0) return;
        state.total++; 
        state.current++; 
        state.wins++;
        state.zero = 0; 
        state.backupLeft = 3; 
        sync();
    }

    // iPhone 震动优化
    function checkVibrate() {
        if(!state.useVibrate || !navigator.vibrate) return;
        if(state.zero >= state.limitZero || state.current >= state.limitMachine || state.backupLeft === 0) {
            navigator.vibrate(200);
            setTimeout(() => navigator.vibrate(200), 300);
        }
    }

    function nextMachine() {
        if(state.current === 0) return;
        let r = "手动";
        if(state.backupLeft >= 0) r = "⭐备份完";
        else if(state.zero >= state.limitZero) r = "止损";
        else if(state.current >= state.limitMachine) r = "上限";

        state.log.unshift({
            id: state.mCount, d: state.currentDenom, tot: state.current, 
            w: state.wins, r: r, t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });

        state.current = 0; state.zero = 0; state.wins = 0; state.loses = 0;
        state.backupLeft = -1; state.mCount++;
        state.currentDenom = state.defaultDenom;
        sync();
    }

    function sync() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        updateUI();
    }

    function updateUI() {
        document.getElementById('disp-total').innerText = state.total;
        document.getElementById('disp-current').innerText = state.current;
        document.getElementById('disp-zero').innerText = state.zero;
        
        const msg = document.getElementById('alert-msg');
        const panel = document.getElementById('db-panel');
        const btnB = document.getElementById('btn-backup');
        
        panel.style.borderColor = "#333";
        if(state.backupLeft >= 0) {
            btnB.innerText = `备份记录 (${state.backupLeft})`;
            btnB.disabled = true;
            msg.innerText = state.backupLeft > 0 ? "⚠️ 备份转数进行中: " + state.backupLeft : "✅ 备份结束，请务必换机";
            msg.style.color = "var(--backup)";
        } else {
            btnB.innerText = "⭐ 10倍大奖";
            btnB.disabled = false;
            if(state.zero >= state.limitZero || state.current >= state.limitMachine) {
                msg.innerText = "🛑 策略提示：请结算换机";
                msg.style.color = "var(--danger)";
                panel.style.borderColor = "var(--danger)";
            } else { msg.innerText = ""; }
        }

        document.getElementById('main-denom-bar').innerHTML = state.denomList.map(d => 
            `<button class="denom-btn ${state.currentDenom === d ? 'active' : ''}" onclick="changeDenom('${d}')">${d}</button>`
        ).join('');

        document.getElementById('log-area').innerHTML = state.log.map(i => 
            `<div class="hist-line">#${i.id} [${i.d}] ${i.r} | ${i.tot}转 (胜${i.w}) <span style="float:right">${i.t}</span></div>`
        ).join('');
    }

    function changeDenom(d) { state.currentDenom = d; sync(); }

    // 配置即时生效修改
    function saveCfg() {
        state.limitTotal = parseInt(document.getElementById('cfg-total').value) || 3000;
        state.limitZero = parseInt(document.getElementById('cfg-zero').value) || 3;
        state.limitMachine = parseInt(document.getElementById('cfg-machine').value) || 20;
        state.useVibrate = document.getElementById('cfg-vibrate').checked;
        state.defaultDenom = document.getElementById('cfg-def-denom').value;
        
        // 即时应用面值
        if(state.current === 0) state.currentDenom = state.defaultDenom;
        sync();
    }

    function exportCSV() {
        let csv = "\uFEFF编号,面值,总转数,中奖,原因,时间\n";
        state.log.forEach(i => csv += `${i.id},${i.d},${i.tot},${i.w},${i.r},${i.t}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Slot_Hunter_Log.csv`;
        a.click();
    }

    function manualEdit(f) {
        let v = prompt("手动调整:", state[f]);
        if(v !== null) { state[f] = parseInt(v) || 0; sync(); }
    }

    function resetSystem() { if(confirm("确定清空所有记录和配置吗？")) { localStorage.clear(); location.reload(); } }

    window.onload = () => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved) state = { ...state, ...JSON.parse(saved) };
        if(state.current === 0) state.currentDenom = state.defaultDenom;
        
        document.getElementById('cfg-total').value = state.limitTotal;
        document.getElementById('cfg-zero').value = state.limitZero;
        document.getElementById('cfg-machine').value = state.limitMachine;
        document.getElementById('cfg-vibrate').checked = state.useVibrate;
        document.getElementById('cfg-def-denom').innerHTML = state.denomList.map(d => `<option value="${d}" ${state.defaultDenom === d ? 'selected' : ''}>${d}</option>`).join('');
        
        // 绑定大按钮单/双击逻辑
        const mainBtn = document.getElementById('main-action-btn');
        mainBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (clickTimer) {
                clearTimeout(clickTimer);
                clickTimer = null;
                handleSpin(true); // 双击中奖
            } else {
                clickTimer = setTimeout(() => {
                    handleSpin(false); // 单击没中
                    clickTimer = null;
                }, 250);
            }
        });

        updateUI();
    };
</script>
</body>
</html>
