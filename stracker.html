<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Slot Hunter Pro</title>
    <style>
        :root { --bg: #000; --card: #161616; --text: #fff; --accent: #f1c40f; --danger: #ff4757; --success: #2ed573; --info: #3498db; --backup: #9b59b6; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; touch-action: manipulation; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 5px; 
            /* 核心修改：减去 120px 确保避开 Safari 底栏 */
            height: calc(100vh - 120px); 
            display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%;
        }

        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 2px 5px; flex-shrink: 0; }
        .logo { font-size: 0.7rem; font-weight: bold; color: #333; }
        .settings-btn { background: #222; border: none; color: #fff; padding: 4px 10px; border-radius: 15px; font-size: 0.7rem; }

        /* 极致压缩数据显示区 */
        .dashboard { background: var(--card); padding: 8px; border-radius: 10px; border: 1px solid #333; margin-bottom: 5px; flex-shrink: 0; }
        .total-box { text-align: center; margin-bottom: 5px; border-bottom: 1px solid #222; }
        .val-total { font-size: 1.6rem; color: var(--info); font-weight: 900; line-height: 1.2; }
        .sub-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .stat-card { background: #222; padding: 4px; border-radius: 6px; text-align: center; }
        .label { font-size: 0.6rem; color: #666; display: block; }
        .val-sub { font-size: 1.1rem; color: var(--accent); font-weight: bold; }
        .alert-msg { height: 18px; line-height: 18px; text-align: center; font-weight: bold; font-size: 0.8rem; color: var(--danger); }

        /* 核心操作区：平分剩余空间 */
        .action-area { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; }
        
        /* 强制每个按钮都有固定比例且不准溢出 */
        .btn-main { flex: 3; border: none; border-radius: 12px; font-size: 1.6rem; font-weight: 900; color: #fff; min-height: 0; }
        .btn-win { background: var(--success); }
        .btn-lose { background: var(--danger); }
        
        .btn-sub { flex: 1.5; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; color: #fff; min-height: 0; }
        .btn-big { background: var(--backup); }
        .btn-next { background: var(--info); }
        
        .btn-sub:disabled { background: #222; color: #444; opacity: 0.5; }
        button:active { opacity: 0.6; transform: scale(0.98); }

        /* 设置抽屉 */
        .drawer { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: #000; z-index: 100; transition: 0.3s; padding: 20px; display: flex; flex-direction: column; }
        .drawer.open { right: 0; }
        .history-pane { background: #111; border-radius: 12px; padding: 10px; font-size: 0.8rem; color: #555; flex-grow: 1; overflow-y: auto; margin-top: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="logo">V11.STABLE</div>
    <button class="settings-btn" onclick="toggleDrawer(true)">配置 / 历史 ⚙️</button>
</div>

<div class="dashboard">
    <div class="total-box">
        <div id="total-spins" class="val-total" onclick="manualEdit('total')">0</div>
        <span class="label">总累计</span>
    </div>
    <div class="sub-stats">
        <div class="stat-card">
            <div id="current-spins" class="val-sub" onclick="manualEdit('current')">0</div>
            <span class="label">当前机</span>
        </div>
        <div class="stat-card">
            <div id="consecutive-zero" class="val-sub" onclick="manualEdit('zero')">0</div>
            <span class="label">连黑</span>
        </div>
    </div>
    <div id="alert-msg" class="alert-msg"></div>
</div>

<div class="action-area">
    <button class="btn-main btn-win" onclick="handleSpin(true)">中 奖</button>
    <button class="btn-main btn-lose" onclick="handleSpin(false)">没 中</button>
    <button class="btn-sub btn-big" id="btn-backup-trigger" onclick="startBackup()">⭐ 大奖备份</button>
    <button class="btn-sub btn-next" onclick="nextMachine()">换下一台 (结算历史)</button>
</div>

<div id="drawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0">设置</h3>
        <button class="settings-btn" onclick="toggleDrawer(false)">关闭</button>
    </div>
    <div style="margin-top:10px; background:#111; padding:10px; border-radius:10px;">
        <p style="font-size:0.8rem; color:#888;">单机上限: <input type="number" id="cfg-machine" value="20" style="width:50px; background:#333; color:#fff; border:none; border-radius:4px;" onchange="saveCfg()"></p>
        <p style="font-size:0.8rem; color:#888;">备份步数: <input type="number" id="cfg-backup" value="3" style="width:50px; background:#333; color:#fff; border:none; border-radius:4px;" onchange="saveCfg()"></p>
    </div>
    <div class="history-pane" id="log-area">暂无记录</div>
    <button onclick="resetSystem()" style="background:none; color:#333; border:1px solid #222; padding:10px; margin-top:10px; width:100%;">重置系统数据</button>
</div>

<script>
    let state = { total: 0, current: 0, zero: 0, mCount: 1, backup: -1, log: "", limitMachine: 20, limitBackup: 3 };

    function syncStorage() { localStorage.setItem('slot_v11', JSON.stringify(state)); render(); }
    function toggleDrawer(o) { document.getElementById('drawer').classList.toggle('open', o); }
    function saveCfg() { state.limitMachine = parseInt(document.getElementById('cfg-machine').value); state.limitBackup = parseInt(document.getElementById('cfg-backup').value); syncStorage(); }

    function handleSpin(w) {
        state.total++; state.current++; state.zero = w ? 0 : state.zero + 1;
        if(state.backup >= 0) {
            state.backup++;
            if(state.backup >= state.limitBackup) {
                render(); setTimeout(() => { alert("备份完成"); state.backup = -1; syncStorage(); }, 50);
            }
        }
        syncStorage();
    }

    function startBackup() {
        if(state.current === 0) return alert("次数为0");
        state.total++; state.current++; state.zero = 0; state.backup = 0; syncStorage();
    }

    function nextMachine() {
        let r = state.zero >= 3 ? "Z" : (state.current >= state.limitMachine ? "L" : "M");
        state.log = `[#${state.mCount}:${state.current}-${r}] ` + state.log;
        state.current = 0; state.zero = 0; state.backup = -1; state.mCount++;
        document.getElementById('log-area').innerHTML = state.log;
        syncStorage();
    }

    function render() {
        document.getElementById('total-spins').innerText = state.total;
        document.getElementById('current-spins').innerText = state.current;
        document.getElementById('consecutive-zero').innerText = state.zero;
        const b = document.getElementById('btn-backup-trigger');
        const m = document.getElementById('alert-msg');
        if(state.backup >= 0) {
            b.disabled = true; b.innerText = "备份记录中...";
            m.innerText = `进度: ${state.backup}/${state.limitBackup}`;
        } else {
            b.disabled = false; b.innerText = "⭐ 大奖备份";
            m.innerText = state.zero >= 3 ? "⚠️ 连黑换机!" : (state.current >= state.limitMachine ? "🛑 满额换机!" : "");
        }
    }

    function manualEdit(t) { let v = prompt("修改:", state[t]); if(v) { state[t] = parseInt(v); syncStorage(); } }
    function resetSystem() { if(confirm("重置？")) { localStorage.clear(); location.reload(); } }
    
    window.onload = () => {
        const s = localStorage.getItem('slot_v11');
        if(s) { state = JSON.parse(s); document.getElementById('cfg-machine').value = state.limitMachine; document.getElementById('cfg-backup').value = state.limitBackup; }
        render();
    };
</script>
</body>
</html>
