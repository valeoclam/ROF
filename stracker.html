<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Slot Hunter Pro</title>
    <style>
        :root { --bg: #000; --card: #161616; --text: #fff; --accent: #f1c40f; --danger: #ff4757; --success: #2ed573; --info: #3498db; --backup: #9b59b6; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; touch-action: manipulation; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 5px; 
            height: calc(100vh - 135px); /* 进一步增加底部预留空间 */
            display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%;
        }

        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 2px 10px; flex-shrink: 0; }
        .logo { font-size: 0.7rem; font-weight: bold; color: #444; }
        .settings-btn { background: #222; border: none; color: #fff; padding: 5px 12px; border-radius: 15px; font-size: 0.75rem; }

        .dashboard { background: var(--card); padding: 8px; border-radius: 12px; border: 1px solid #333; margin-bottom: 5px; flex-shrink: 0; }
        .total-box { text-align: center; margin-bottom: 4px; border-bottom: 1px solid #222; }
        .val-total { font-size: 1.6rem; color: var(--info); font-weight: 900; line-height: 1.2; }
        .sub-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-card { background: #222; padding: 4px; border-radius: 8px; text-align: center; }
        .label { font-size: 0.6rem; color: #777; display: block; }
        .val-sub { font-size: 1.1rem; color: var(--accent); font-weight: bold; }
        
        /* 文字提醒区 */
        .alert-msg { height: 24px; line-height: 24px; text-align: center; font-weight: bold; font-size: 0.9rem; margin-top: 4px; transition: 0.3s; }
        .msg-success { color: var(--success); }
        .msg-warning { color: var(--danger); animation: blink 0.8s infinite; }
        .msg-backup { color: var(--backup); }

        .action-area { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; }
        .btn-main { flex: 3; border: none; border-radius: 14px; font-size: 1.7rem; font-weight: 900; color: #fff; }
        .btn-win { background: var(--success); }
        .btn-lose { background: var(--danger); }
        .btn-sub { flex: 1.2; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; color: #fff; }
        .btn-big { background: var(--backup); }
        .btn-next { background: var(--info); }
        
        .btn-sub:disabled { background: #111; color: #333; opacity: 0.5; }
        button:active { opacity: 0.6; transform: scale(0.97); }

        .drawer { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: #000; z-index: 100; transition: 0.3s; padding: 20px; display: flex; flex-direction: column; }
        .drawer.open { right: 0; }
        .config-list { background: #111; border-radius: 12px; padding: 12px; }
        .config-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
        input { background: #333; border: none; color: #fff; width: 60px; height: 28px; text-align: center; border-radius: 5px; font-weight: bold; }
        .history-pane { background: #111; border-radius: 12px; padding: 12px; font-size: 0.85rem; color: #888; flex-grow: 1; overflow-y: auto; margin-top: 15px; border: 1px solid #222; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="logo">SLOT V14 PRO</div>
    <button class="settings-btn" onclick="toggleDrawer(true)">配置/历史</button>
</div>

<div class="dashboard">
    <div class="total-box">
        <div id="total-spins" class="val-total" onclick="manualEdit('total')">0</div>
        <span class="label">总 SPIN 累计</span>
    </div>
    <div class="sub-stats">
        <div class="stat-card">
            <div id="current-spins" class="val-sub" onclick="manualEdit('current')">0</div>
            <span class="label">单机次数</span>
        </div>
        <div class="stat-card">
            <div id="consecutive-zero" class="val-sub" onclick="manualEdit('zero')">0</div>
            <span class="label">连续 0 中</span>
        </div>
    </div>
    <div id="alert-msg" class="alert-msg"></div>
</div>

<div class="action-area">
    <button class="btn-main btn-win" onclick="handleSpin(true)">中 奖</button>
    <button class="btn-main btn-lose" onclick="handleSpin(false)">没 中</button>
    <button class="btn-sub btn-big" id="btn-backup-trigger" onclick="startBackup()">⭐ 10倍大奖 (开启备份)</button>
    <button class="btn-sub btn-next" onclick="nextMachine()">换下一台 (结算历史)</button>
</div>

<div id="drawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="margin:0">设置与历史</h3>
        <button class="settings-btn" onclick="toggleDrawer(false)">关闭 ✕</button>
    </div>
    <div class="config-list">
        <div class="config-item"><span>总目标</span><input type="number" id="cfg-total" value="3000" onchange="saveCfg()"></div>
        <div class="config-item"><span>连黑止损</span><input type="number" id="cfg-zero" value="3" onchange="saveCfg()"></div>
        <div class="config-item"><span>单机上限</span><input type="number" id="cfg-machine" value="20" onchange="saveCfg()"></div>
        <div class="config-item"><span>备份步数</span><input type="number" id="cfg-backup" value="3" onchange="saveCfg()"></div>
    </div>
    <div class="history-pane" id="log-area">暂无记录...</div>
    <button onclick="resetSystem()" style="background:none; color:#444; border:1px solid #222; padding:10px; margin-top:10px; width:100%; border-radius:8px;">清空所有数据</button>
</div>

<script>
    let state = { 
        total: 0, current: 0, zero: 0, mCount: 1, backup: -1, wasBackup: false, log: "",
        limitTotal: 3000, limitZero: 3, limitMachine: 20, limitBackup: 3 
    };

    function toggleDrawer(open) { document.getElementById('drawer').classList.toggle('open', open); }

    function saveCfg() {
        state.limitTotal = parseInt(document.getElementById('cfg-total').value) || 3000;
        state.limitZero = parseInt(document.getElementById('cfg-zero').value) || 3;
        state.limitMachine = parseInt(document.getElementById('cfg-machine').value) || 20;
        state.limitBackup = parseInt(document.getElementById('cfg-backup').value) || 3;
        syncStorage();
    }

    function syncStorage() {
        localStorage.setItem('slot_v14_data', JSON.stringify(state));
        render();
    }

    function handleSpin(win) {
        state.total++; state.current++;
        state.zero = win ? 0 : state.zero + 1;
        
        // 备份计数逻辑
        if(state.backup >= 0 && state.backup < state.limitBackup) {
            state.backup++;
        }
        syncStorage();
    }

    function startBackup() {
        if(state.current === 0) return;
        state.total++; state.current++; 
        state.zero = 0; 
        state.backup = 0; // 开启备份
        state.wasBackup = true; // 只要点过，这台机结算时就是大奖机
        syncStorage();
    }

    function nextMachine() {
        let reason = "手动换机";
        if(state.wasBackup) reason = "⭐ 大奖备份";
        else if(state.zero >= state.limitZero) reason = "连黑止损";
        else if(state.current >= state.limitMachine) reason = "满额换机";
        
        const record = `<div style="margin-bottom:6px; border-bottom:1px solid #222; padding-bottom:2px;">第${state.mCount}台: ${state.current}转 (${reason})</div>`;
        state.log = record + state.log;
        
        state.current = 0; state.zero = 0; state.backup = -1; state.wasBackup = false; state.mCount++;
        document.getElementById('log-area').innerHTML = state.log;
        syncStorage();
    }

    function render() {
        document.getElementById('total-spins').innerText = state.total;
        document.getElementById('current-spins').innerText = state.current;
        document.getElementById('consecutive-zero').innerText = state.zero;
        
        const msg = document.getElementById('alert-msg');
        const btnB = document.getElementById('btn-backup-trigger');
        
        msg.className = "alert-msg"; // 重置样式
        
        if(state.backup >= 0) {
            btnB.disabled = true;
            btnB.innerText = `备份记录中...`;
            if(state.backup < state.limitBackup) {
                msg.innerText = `🔄 备份进度: ${state.backup}/${state.limitBackup}`;
                msg.classList.add("msg-backup");
            } else {
                msg.innerText = `✅ 备份已完成 (${state.limitBackup}/${state.limitBackup})`;
                msg.classList.add("msg-success");
            }
        } else {
            btnB.disabled = false;
            btnB.innerText = `⭐ 10倍大奖 (开启备份)`;
            if(state.zero >= state.limitZero) {
                msg.innerText = "⚠️ 触发止损，请换机!";
                msg.classList.add("msg-warning");
            } else if(state.current >= state.limitMachine) {
                msg.innerText = "🛑 达到上限，请换机!";
                msg.classList.add("msg-warning");
            } else {
                msg.innerText = "";
            }
        }
    }

    function manualEdit(type) {
        let v = prompt("修改:", state[type]);
        if(v !== null) { state[type] = parseInt(v) || 0; syncStorage(); }
    }

    function resetSystem() { if(confirm("重置所有？")) { localStorage.clear(); location.reload(); } }

    window.onload = () => {
        const saved = localStorage.getItem('slot_v14_data');
        if(saved) {
            state = { ...state, ...JSON.parse(saved) };
            document.getElementById('cfg-total').value = state.limitTotal;
            document.getElementById('cfg-zero').value = state.limitZero;
            document.getElementById('cfg-machine').value = state.limitMachine;
            document.getElementById('cfg-backup').value = state.limitBackup;
            document.getElementById('log-area').innerHTML = state.log || "暂无记录";
        }
        render();
    };
</script>
</body>
</html>
