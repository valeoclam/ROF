<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Slot Hunter V17</title>
    <style>
        :root { --bg: #000; --card: #161616; --text: #fff; --accent: #f1c40f; --danger: #ff4757; --success: #2ed573; --info: #3498db; --backup: #9b59b6; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; touch-action: manipulation; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 5px; height: calc(100vh - 135px);
            display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%;
        }

        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 2px 10px; flex-shrink: 0; }
        .denom-group { display: flex; background: #222; border-radius: 12px; padding: 2px; overflow-x: auto; max-width: 70%; scrollbar-width: none; }
        .denom-btn { border: none; background: none; color: #666; padding: 5px 12px; font-size: 0.75rem; border-radius: 10px; font-weight: bold; white-space: nowrap; }
        .denom-btn.active { background: var(--info); color: #fff; }
        .settings-btn { background: #222; border: none; color: #fff; padding: 6px 12px; border-radius: 15px; font-size: 0.75rem; }

        .dashboard { background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #333; margin: 5px 0; flex-shrink: 0; }
        .total-box { text-align: center; margin-bottom: 5px; border-bottom: 1px solid #222; }
        .val-total { font-size: 1.8rem; color: var(--info); font-weight: 900; line-height: 1.2; }
        .sub-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-card { background: #222; padding: 5px; border-radius: 8px; text-align: center; }
        .label { font-size: 0.65rem; color: #777; display: block; }
        .val-sub { font-size: 1.2rem; color: var(--accent); font-weight: bold; }
        .alert-msg { height: 24px; line-height: 24px; text-align: center; font-weight: bold; font-size: 0.85rem; margin-top: 5px; }

        .action-area { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .btn-main { flex: 3; border: none; border-radius: 16px; font-size: 1.8rem; font-weight: 900; color: #fff; }
        .btn-win { background: var(--success); }
        .btn-lose { background: var(--danger); }
        .btn-sub { flex: 1.2; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; color: #fff; }
        .btn-big { background: var(--backup); }
        .btn-next { background: var(--info); }
        
        .drawer { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: #000; z-index: 100; transition: 0.3s; padding: 15px; display: flex; flex-direction: column; }
        .drawer.open { right: 0; }
        .config-list { background: #111; border-radius: 12px; padding: 12px; flex-shrink: 0; overflow-y: auto; max-height: 55vh; }
        .config-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
        
        .denom-tag { background: #333; padding: 2px 8px; border-radius: 5px; margin-right: 5px; display: inline-flex; align-items: center; }
        .denom-del { color: var(--danger); margin-left: 5px; font-weight: bold; padding: 0 4px; }
        
        input, select { background: #333; border: none; color: #fff; padding: 5px; text-align: center; border-radius: 5px; font-weight: bold; }
        .history-pane { background: #111; border-radius: 12px; padding: 12px; font-size: 0.75rem; color: #aaa; flex-grow: 1; overflow-y: auto; margin-top: 15px; border: 1px solid #222; }
        .history-item { margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px dotted #333; }
        
        button:active { opacity: 0.6; transform: scale(0.97); }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="denom-group" id="main-denom-bar"></div>
    <button class="settings-btn" onclick="toggleDrawer(true)">配置/历史 ⚙️</button>
</div>

<div class="dashboard">
    <div class="total-box">
        <div id="total-spins" class="val-total" onclick="manualEdit('total')">0</div>
        <span class="label">总 SPIN 累计</span>
    </div>
    <div class="sub-stats">
        <div class="stat-card">
            <div id="current-spins" class="val-sub" onclick="manualEdit('current')">0</div>
            <span class="label">单机转数</span>
        </div>
        <div class="stat-card">
            <div id="consecutive-zero" class="val-sub" onclick="manualEdit('zero')">0</div>
            <span class="label">连黑转数</span>
        </div>
    </div>
    <div id="alert-msg" class="alert-msg"></div>
</div>

<div class="action-area">
    <button class="btn-main btn-win" onclick="handleSpin(true)">中 奖</button>
    <button class="btn-main btn-lose" onclick="handleSpin(false)">没 中</button>
    <button class="btn-sub btn-big" id="btn-backup-trigger" onclick="startBackup()">⭐ 10倍大奖 (开启备份)</button>
    <button class="btn-sub btn-next" onclick="nextMachine()">换下一台 (结算历史)</button>
</div>

<div id="drawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3 style="margin:0">设置与历史</h3>
        <button class="settings-btn" onclick="toggleDrawer(false)">关闭</button>
    </div>
    <div class="config-list">
        <div class="config-item"><span>总目标</span><input type="number" id="cfg-total" onchange="saveCfg()"></div>
        <div class="config-item"><span>连黑止损</span><input type="number" id="cfg-zero" onchange="saveCfg()"></div>
        <div class="config-item"><span>单机上限</span><input type="number" id="cfg-machine" onchange="saveCfg()"></div>
        <div class="config-item"><span>备份转数</span><input type="number" id="cfg-backup" onchange="saveCfg()"></div>
        
        <div class="config-item" style="flex-direction: column; align-items: flex-start; gap: 10px;">
            <span>面值列表管理:</span>
            <div id="denom-manager-list" style="width:100%; display: flex; flex-wrap: wrap; gap: 5px;"></div>
            <div style="display:flex; gap:5px; width:100%;">
                <input type="text" id="new-denom-input" placeholder="例: 10¢" style="flex:1">
                <button onclick="addDenom()" style="background:var(--success); border:none; color:#fff; border-radius:5px; padding:0 15px;">添加</button>
            </div>
        </div>

        <div class="config-item">
            <span>默认启动面值:</span>
            <select id="cfg-default-denom" onchange="saveCfg()"></select>
        </div>
    </div>

    <div class="history-pane" id="log-area"></div>
    <button class="settings-btn" style="background:var(--info); margin-top:10px; border-radius:10px; padding:12px;" onclick="exportCSV()">导出 CSV 历史</button>
    <button onclick="resetSystem()" style="background:none; color:#444; border:1px solid #222; padding:10px; margin-top:10px; width:100%; border-radius:8px;">清空所有数据</button>
</div>

<script>
    const STORAGE_KEY = 'SLOT_HUNTER_V17_STABLE';
    let state = { 
        total: 0, current: 0, zero: 0, winCount: 0, loseCount: 0,
        mCount: 1, backup: -1, wasBackup: false, log: [], 
        denomList: ['1¢', '2¢', '5¢'], 
        currentDenom: '1¢',
        defaultDenom: '1¢',
        limitTotal: 3000, limitZero: 3, limitMachine: 20, limitBackup: 3 
    };

    function toggleDrawer(open) { document.getElementById('drawer').classList.toggle('open', open); }

    function addDenom() {
        const input = document.getElementById('new-denom-input');
        const val = input.value.trim();
        if(val && !state.denomList.includes(val)) {
            state.denomList.push(val);
            input.value = '';
            syncStorage();
            renderDenomSettings();
        }
    }

    function removeDenom(val) {
        if(state.denomList.length <= 1) return alert("至少保留一个面值");
        state.denomList = state.denomList.filter(d => d !== val);
        if(state.defaultDenom === val) state.defaultDenom = state.denomList[0];
        if(state.currentDenom === val) state.currentDenom = state.denomList[0];
        syncStorage();
        renderDenomSettings();
    }

    function renderDenomSettings() {
        const list = document.getElementById('denom-manager-list');
        list.innerHTML = state.denomList.map(d => `
            <span class="denom-tag">${d}<span class="denom-del" onclick="removeDenom('${d}')">×</span></span>
        `).join('');

        const select = document.getElementById('cfg-default-denom');
        select.innerHTML = state.denomList.map(d => `
            <option value="${d}" ${state.defaultDenom === d ? 'selected' : ''}>${d}</option>
        `).join('');

        const bar = document.getElementById('main-denom-bar');
        bar.innerHTML = state.denomList.map(d => `
            <button class="denom-btn ${state.currentDenom === d ? 'active' : ''}" onclick="setDenom('${d}')">${d}</button>
        `).join('');
    }

    function setDenom(val) {
        state.currentDenom = val;
        syncStorage();
    }

    function saveCfg() {
        state.limitTotal = parseInt(document.getElementById('cfg-total').value) || 3000;
        state.limitZero = parseInt(document.getElementById('cfg-zero').value) || 3;
        state.limitMachine = parseInt(document.getElementById('cfg-machine').value) || 20;
        state.limitBackup = parseInt(document.getElementById('cfg-backup').value) || 3;
        state.defaultDenom = document.getElementById('cfg-default-denom').value;
        
        // 关键逻辑：修改设置后立即尝试应用面值（如果当前没有正在进行的转数）
        if(state.current === 0) state.currentDenom = state.defaultDenom;
        
        syncStorage();
    }

    function syncStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        render();
    }

    function handleSpin(win) {
        state.total++; state.current++;
        state.zero = win ? 0 : state.zero + 1;
        if(win) state.winCount++; else state.loseCount++;
        if(state.backup >= 0 && state.backup < state.limitBackup) state.backup++;
        syncStorage();
    }

    function startBackup() {
        if(state.current === 0) return;
        state.total++; state.current++; state.loseCount++;
        state.zero = 0; state.backup = 0; state.wasBackup = true;
        syncStorage();
    }

    function nextMachine() {
        let reason = "手动换机";
        if(state.wasBackup) reason = "⭐大奖备份";
        else if(state.zero >= state.limitZero) reason = "连黑止损";
        else if(state.current >= state.limitMachine) reason = "满额换机";
        
        state.log.unshift({
            id: state.mCount, denom: state.currentDenom, total: state.current,
            wins: state.winCount, loses: state.loseCount, reason: reason,
            time: new Date().toLocaleTimeString()
        });
        
        state.current = 0; state.zero = 0; state.winCount = 0; state.loseCount = 0;
        state.backup = -1; state.wasBackup = false; state.mCount++;
        
        // 机器结算后，自动切回到默认启动面值
        state.currentDenom = state.defaultDenom;
        
        syncStorage();
    }

    function render() {
        document.getElementById('total-spins').innerText = state.total;
        document.getElementById('current-spins').innerText = state.current;
        document.getElementById('consecutive-zero').innerText = state.zero;
        
        document.querySelectorAll('.denom-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === state.currentDenom);
        });

        const msg = document.getElementById('alert-msg');
        const btnB = document.getElementById('btn-backup-trigger');
        msg.className = "alert-msg";
        
        if(state.backup >= 0) {
            btnB.disabled = true;
            btnB.innerText = `备份记录中...`;
            if(state.backup < state.limitBackup) {
                msg.innerText = `🔄 备份进度: ${state.backup}/${state.limitBackup}`;
                msg.style.color = "var(--backup)";
            } else {
                msg.innerText = `✅ 备份转数已达标`;
                msg.style.color = "var(--success)";
            }
        } else {
            btnB.disabled = false;
            btnB.innerText = `⭐ 10倍大奖 (开启备份)`;
            if(state.zero >= state.limitZero) {
                msg.innerText = "⚠️ 建议止损换机"; msg.style.color = "var(--danger)";
            } else if(state.current >= state.limitMachine) {
                msg.innerText = "🛑 已达单机上限"; msg.style.color = "var(--danger)";
            } else { msg.innerText = ""; }
        }

        const logHtml = state.log.map(i => `
            <div class="history-item">
                <b>#${i.id} (${i.denom})</b> - ${i.reason}<br>
                转数:${i.total} | 胜:${i.wins} | 负:${i.loses} <small style="float:right">${i.time}</small>
            </div>
        `).join('');
        document.getElementById('log-area').innerHTML = logHtml || "暂无记录";
    }

    function exportCSV() {
        if(state.log.length === 0) return;
        let csv = "\uFEFF编号,面值,总转数,中奖,未中,原因,时间\n";
        state.log.forEach(i => csv += `${i.id},${i.denom},${i.total},${i.wins},${i.loses},${i.reason},${i.time}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Slot_Data_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    function manualEdit(type) {
        let v = prompt("修改:", state[type]);
        if(v !== null) { state[type] = parseInt(v) || 0; syncStorage(); }
    }

    function resetSystem() { if(confirm("重置所有？")) { localStorage.clear(); location.reload(); } }

    window.onload = () => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved) {
            state = { ...state, ...JSON.parse(saved) };
            // 核心修复点：初始化加载时，如果当前没有转数记录，则应用默认启动面值
            if(state.current === 0) {
                state.currentDenom = state.defaultDenom;
            }
        }
        document.getElementById('cfg-total').value = state.limitTotal;
        document.getElementById('cfg-zero').value = state.limitZero;
        document.getElementById('cfg-machine').value = state.limitMachine;
        document.getElementById('cfg-backup').value = state.limitBackup;
        renderDenomSettings();
        render();
    };
</script>
</body>
</html>
